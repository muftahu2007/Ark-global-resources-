{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | PASSWORD UPDATED</title>
    <script src="{% static 'js/tailwind.min.js' %}"></script>
    <link href="{% static 'css/fonts.css' %}" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ark-gold': '#C5A059',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        tech: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }

    <style>
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body { background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #020202 100%); }
    </style>

<body class="text-gray-300 min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="w-full max-w-md relative glass rounded-3xl p-10 shadow-2xl text-center">
        <div class="w-20 h-20 mx-auto rounded-full border border-green-500/30 flex items-center justify-center mb-6 bg-green-500/10">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h1 class="font-tech text-xs text-ark-gold tracking-[0.5em] uppercase mb-2">Clearance Restored</h1>
        <h2 class="font-serif text-3xl text-white tracking-wide">Update Complete</h2>
        <p class="text-xs text-gray-500 mt-4 leading-relaxed mb-8">Your command center password has been successfully updated.</p>
        
        <a href="{% url 'ceo_login' %}" class="inline-block w-full text-center px-8 py-4 bg-ark-gold text-black font-tech text-xs tracking-[0.3em] uppercase rounded-xl hover:bg-[#E5C17D] transition-colors shadow-[0_0_20px_rgba(197,160,89,0.2)]">
            Access Portal
        </a>
    </div>
</body>
</html>
