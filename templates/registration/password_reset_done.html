{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | RESET EMAIL SENT</title>
    <script src="{% static 'js/tailwind.min.js' %}"></script>
    <link href="{% static 'css/fonts.css' %}" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ark-black': '#020202',
                        'ark-dark': '#080808',
                        'ark-gold': '#C5A059',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        tech: ['Orbitron', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #020202 100%);
            overflow: hidden;
        }
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(at 0% 0%, hsla(41, 49%, 36%, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(41, 49%, 36%, 0.1) 0, transparent 50%);
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="mesh-bg"></div>
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-ark-gold/5 rounded-full blur-[100px] animate-pulse-slow"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-ark-gold/5 rounded-full blur-[100px] animate-pulse-slow" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2 z-10">
            <div class="w-24 h-24 rounded-full glass flex items-center justify-center border border-ark-gold/20 shadow-2xl animate-float">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-ark-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
        </div>

        <div class="glass rounded-3xl p-10 pt-16 shadow-2xl relative overflow-hidden text-center">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-ark-gold/30 to-transparent"></div>
            
            <h1 class="font-tech text-xs text-ark-gold tracking-[0.5em] uppercase mb-2">Transmission Sent</h1>
            <h2 class="font-serif text-3xl text-white tracking-wide">Check Inbox</h2>
            <p class="text-xs text-gray-500 mt-4 leading-relaxed">If the email is registered in our database, you will receive a secure link to reset your password shortly.</p>
            
            <div class="mt-8">
                <a href="{% url 'ceo_login' %}" class="inline-block px-8 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs uppercase tracking-widest text-ark-gold transition-colors border border-white/10">
                    Return to Portal
                </a>
            </div>
        </div>
    </div>
</body>
</html>
